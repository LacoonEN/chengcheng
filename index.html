<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>誠誠的天上天下 | Cheng`s space</title>
    <style>
        /* CSS Variables - 色調：銀白色 */
        :root {
            --bg-dark: #0a0b0e;        /* 極深背景色（帶微量冷色調的黑） */
            --primary-color: #b0b5c0;  /* 主要鮮豔色（質感銀灰） */
            --light-color: #f0f2f5;    /* 粉彩/淺色（柔和白） */
            --neon-color: #ffffff;     /* 極度飽和發光色（純白光芒） */
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(176, 181, 192, 0.15), transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(255, 255, 255, 0.1), transparent 40%);
            font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif;
            color: var(--light-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Glassmorphism 模板設計 */
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            display: flex;
            max-width: 1000px;
            width: 90%;
            margin: 40px auto;
            overflow: hidden;
            animation: slideDownFade 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* 左側圖片區塊 */
        .image-wrapper {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .image-wrapper img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.4));
            animation: floatOnly 4s ease-in-out infinite;
        }

        /* 右側資訊區塊 */
        .info-wrapper {
            flex: 1.2;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .shineText {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: var(--neon-color);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .en-title {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin: 0 0 30px 0;
            font-weight: 300;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .char-name {
            font-size: 2rem;
            color: var(--light-color);
            margin: 0 0 15px 0;
            display: inline-block;
            position: relative;
        }

        .char-name::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 40px;
            height: 3px;
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--neon-color);
            border-radius: 2px;
        }

        .intro {
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 15px 0 30px 0;
            color: var(--light-color);
            opacity: 0.85;
        }

        .info-list {
            list-style: none;
            padding: 0;
            margin: 0 0 40px 0;
        }

        .info-list li {
            margin-bottom: 12px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid var(--primary-color);
        }

        .info-list li strong {
            color: var(--light-color);
            width: 90px;
            font-weight: 600;
        }

        .info-list li span {
            color: var(--primary-color);
        }

        /* 社群按鈕 */
        .social-links {
            display: flex;
            gap: 15px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--light-color);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            background: var(--light-color);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-color);
            transform: translateY(-4px);
            border-color: var(--neon-color);
        }

        .social-links svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: fill 0.3s ease;
        }

        /* 動畫設定 */
        @keyframes slideDownFade {
            0% {
                opacity: 0;
                transform: translateY(-40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatOnly {
            0% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }

        /* RWD 響應式設計 */
        @media (max-width: 768px) {
            .glass-container {
                flex-direction: column;
                margin: 20px auto;
            }
            .image-wrapper {
                padding: 30px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .info-wrapper {
                padding: 30px;
            }
            .shineText {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="image-wrapper">
            <img src="profile.png" alt="誠" class="floatOnly">
        </div>

        <div class="info-wrapper">
            <h1 class="shineText">誠誠的天上天下</h1>
            <h2 class="en-title">Cheng`s space</h2>
            
            <h3 class="char-name">誠</h3>
            <p class="intro">沉著冷靜的刀使</p>
            
            <ul class="info-list">
                <li><strong>設定設計</strong> <span>圖圖犬</span></li>
            </ul>
            
            <div class="social-links">
                <a href="https://www.facebook.com/share/18EvYjvaM4/" target="_blank" rel="noopener noreferrer" aria-label="Facebook" title="Facebook">
                    <svg viewBox="0 0 320 512" xmlns="http://www.w3.org/2000/svg">
                        <path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
