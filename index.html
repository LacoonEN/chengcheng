<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>誠誠的天上天下 | 沉著冷靜的刀使</title>
    <style>
        /* CSS 變數：定義銀白主題色 */
        :root {
            --bg-dark: #0a0a0c; /* 深邃黑灰底色 */
            --primary-silver: #a1a1aa; /* 基礎銀 */
            --light-silver: #f4f4f5; /* 亮銀白 */
            --neon-silver: #e4e4e7; /* 霓虹銀 */
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        /* 基礎設定與重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(228, 228, 231, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #18181b 0%, var(--bg-dark) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 2rem 0;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem; 
        }

        /* 👑 標題樣式 */
        .hero-title {
            text-align: center;
            animation: slideDownFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
            z-index: 10;
        }

        .hero-title h1 {
            font-size: 4.5rem; /* 稍微調整大小以容納較長的中文標題 */
            font-weight: 900; 
            letter-spacing: -1px; 
            line-height: 1.1;
            margin-bottom: 0.5rem;
            
            /* 銀白金屬漸層 */
            background: linear-gradient(135deg, #fff 0%, var(--primary-silver) 45%, var(--neon-silver) 50%, #fff 55%, var(--primary-silver) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;

            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 20px rgba(228, 228, 231, 0.3),
                0 0 40px rgba(228, 228, 231, 0.1);
        }

        .hero-title p {
            font-size: 1.5rem;
            color: var(--light-silver);
            font-weight: 700;
            letter-spacing: 8px; 
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            margin-top: 5px;
            margin-left: 8px; 
        }

        /* 📸 中間圖片區塊：純上下漂浮，無互動 */
        .image-showcase {
            position: relative;
            width: 100%;
            max-width: 550px; 
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 1; 
            animation: floatOnly 6s ease-in-out infinite;
            pointer-events: none; 
        }

        /* 背景光暈 (銀白色系) */
        .image-showcase::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: var(--light-silver);
            filter: blur(120px);
            opacity: 0.25;
            border-radius: 50%;
            z-index: -1;
        }

        .character-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.8));
        }

        /* 📝 玻璃擬態資訊卡片 */
        .info-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            animation-delay: 0.3s;
            z-index: 10;
        }

        .info-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--light-silver);
            margin-bottom: 2rem;
            border-left: 4px solid var(--neon-silver);
            padding-left: 1rem;
            line-height: 1;
        }

        /* 🔄 自我介紹欄位互動特效 */
        .info-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .info-list li {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid transparent;
            
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .info-list li:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .info-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(to bottom, #fff, var(--primary-silver));
            transition: width 0.3s ease;
            box-shadow: 0 0 15px #fff;
        }

        .info-list li:hover::before {
            width: 5px;
        }

        .info-list strong {
            color: var(--light-silver);
            width: 140px;
            flex-shrink: 0;
            font-weight: 700;
            transition: color 0.3s ease;
        }
        
        .info-list li:hover strong {
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* 社群按鈕區塊 */
        .social-links {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.2rem;
            justify-content: flex-start;
        }

        .social-btn {
            text-decoration: none;
            color: var(--text-main);
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #3b5998, #8b9dc3); /* 配合 FB 色調的冷色漸層 */
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        .social-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(59, 89, 152, 0.4);
            border-color: transparent;
        }

        .social-btn:hover::before {
            opacity: 1;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .hero-title h1 { font-size: 3rem; }
            .hero-title p { font-size: 1.1rem; letter-spacing: 4px; }
            .image-showcase { height: 350px; max-width: 350px; }
            .info-card { padding: 2rem; }
            .info-list li { flex-direction: column; align-items: flex-start; gap: 0.3rem; padding: 1rem; }
            .info-list strong { width: 100%; }
            .social-links { flex-direction: column; gap: 0.8rem; }
            .social-btn { justify-content: center; }
        }

        /* 關鍵格動畫 */
        @keyframes slideDownFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        @keyframes floatOnly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero-title">
            <h1>誠誠的天上天下</h1>
            <p>Cheng's space</p>
        </header>

        <div class="image-showcase">
            <img src="profile.png" alt="誠 沉著冷靜的刀使" class="character-img">
        </div>

        <div class="info-card">
            <h2>自我介紹</h2>
            <ul class="info-list">
                <li><strong>簡介</strong> 沉著冷靜的刀使</li>
                <li><strong>名字</strong> 誠</li>
                <li><strong>設定設計</strong> 圖圖犬</li>
            </ul>

            <div class="social-links">
                <a href="https://www.facebook.com/share/18EvYjvaM4/" target="_blank" class="social-btn">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
                    Facebook
                </a>
            </div>
        </div>
    </div>

</body>
</html>
